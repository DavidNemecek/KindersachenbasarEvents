<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kindersachenbasar - Download</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --card: #fff;
        --text: #111827;
        --muted: #6b7280;
        --primary: #2563eb;
        --primaryHover: #1d4ed8;
        --border: #e5e7eb;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 24px;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(720px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        padding: 20px 18px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 10px 0;
        line-height: 1.45;
      }
      .muted {
        color: var(--muted);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin: 14px 0 6px;
      }
      .btn {
        appearance: none;
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
      }
      .btn:hover { background: var(--primaryHover); }
      .btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .link {
        color: var(--primary);
        text-decoration: none;
      }
      .link:hover { text-decoration: underline; }
      .box {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        background: #fafafa;
        margin-top: 12px;
      }
      .status {
        font-size: 14px;
        color: var(--muted);
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Kindersachenbasar - Kalender Download</h1>
      <p class="muted">
        Diese Seite startet den Download der neuesten Kalender-Datei (<code>.ics</code>) und leitet danach auf die Terminseite weiter.
      </p>

      <div class="row">
        <button class="btn" id="downloadButton" type="button">Download starten</button>
        <a class="link" href="termin.html">Zur Terminseite</a>
      </div>


    </main>

    <script>
      const CANONICAL_ORIGIN = "https://nextkbasar.neyda.at";
      if (window.location.protocol === "http:") {
        window.location.replace(window.location.href.replace(/^http:/, "https:"));
      } else if (window.location.origin !== CANONICAL_ORIGIN && window.location.hostname.endsWith("github.io")) {
        const path = window.location.pathname.replace(/^\/KindersachenbasarEvents(\/|$)/, "/");
        window.location.replace(`${CANONICAL_ORIGIN}${path}${window.location.search}${window.location.hash}`);
      }

      const ICAL_DIR = "IcalFiles/";

      async function fileExists(url) {
        try {
          const response = await fetch(url, { method: "HEAD", cache: "no-store" });
          return response.ok;
        } catch {
          return false;
        }
      }

      async function findLatestFileName() {
        const currentYear = new Date().getFullYear();
        for (let year = currentYear + 2; year >= currentYear - 3; year--) {
          const second = `2KBasar${year}.ics`;
          if (await fileExists(ICAL_DIR + second)) return second;
          const first = `1KBasar${year}.ics`;
          if (await fileExists(ICAL_DIR + first)) return first;
        }
        return null;
      }

      function renderFallbackLinks() {
        const container = document.getElementById("fallbackLinks");
        if (!container) return;

        const currentYear = new Date().getFullYear();
        const years = [];
        for (let y = currentYear + 1; y >= currentYear - 1; y--) years.push(y);
        const parts = [];
        for (const y of years) {
          parts.push(`<a class="link" href="${ICAL_DIR}2KBasar${y}.ics">2KBasar${y}.ics</a>`);
          parts.push(`<a class="link" href="${ICAL_DIR}1KBasar${y}.ics">1KBasar${y}.ics</a>`);
        }
        container.innerHTML = parts.join(" · ");
      }

      async function downloadAndRedirect() {
        const status = document.getElementById("statusText");
        const button = document.getElementById("downloadButton");
        if (button) button.disabled = true;
        if (status) status.textContent = "Suche nach der neuesten Datei…";

        const fileName = await findLatestFileName();
        if (!fileName) {
          if (status) status.textContent = "Es konnte keine Kalender-Datei gefunden werden.";
          if (button) button.disabled = false;
          return;
        }

        const url = ICAL_DIR + fileName;
        if (status) status.textContent = `Gefunden: ${fileName} – Download startet…`;

        const direct = document.getElementById("directLink");
        if (direct) {
          direct.style.display = "block";
          direct.innerHTML = `Direktlink: <a class="link" href="${url}">${fileName}</a>`;
        }

        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        if (status) status.textContent = "Download gestartet – Weiterleitung zur Terminseite…";
        if (button) button.disabled = false;
        window.setTimeout(() => window.location.replace("termin.html"), 1200);
      }

      renderFallbackLinks();
      window.addEventListener("load", () => downloadAndRedirect());
      document.getElementById("downloadButton").addEventListener("click", () => downloadAndRedirect());
    </script>
  </body>
</html>
